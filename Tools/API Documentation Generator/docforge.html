<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DocForge — API Documentation Generator</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Bebas+Neue&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #ffffff;
  --surface: #ffffff;
  --bg2: #f8f9fa;
  --border: #e2e8f0;
  --text: #0f1f3d;
  --muted: #64748b;
  --navy: #0f1f3d;
  --blue: #1a7fd4;
  --green: #00a65a;
  --amber: #e07800;
  --red: #e03030;
  --shadow: 0 1px 8px rgba(15,31,61,0.07);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%; overflow: hidden;
  font-family: 'JetBrains Mono', monospace;
  background: var(--bg); color: var(--text);
}

body {
  background-image: repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(15,31,61,0.04) 39px, rgba(15,31,61,0.04) 40px),
                    repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(15,31,61,0.04) 39px, rgba(15,31,61,0.04) 40px);
  background-size: 40px 40px;
}

/* ── HEADER ── */
header {
  height: 52px; background: var(--navy); border-bottom: 2px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; justify-content: space-between; padding: 0 28px;
  flex-shrink: 0; z-index: 100; position: relative;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-mark {
  width: 30px; height: 30px; background: var(--blue);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Bebas Neue'; color: #fff; font-size: 13px; letter-spacing: 1px;
  clip-path: polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);
}
.logo-text { font-family: 'Bebas Neue'; font-size: 24px; letter-spacing: 3px; color: #fff; }
.logo-text span { color: var(--blue); }
.header-right { display: flex; align-items: center; gap: 10px; }
.hdr-badge { font-size: 10px; letter-spacing: 1px; padding: 3px 9px; border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.5); }
.reset-btn {
  padding: 5px 14px; font-family: 'JetBrains Mono'; font-size: 10px; font-weight: 700;
  letter-spacing: 1px; border: 1px solid rgba(255,255,255,0.2); background: none;
  color: rgba(255,255,255,0.6); cursor: pointer; transition: all 0.15s; text-transform: uppercase;
}
.reset-btn:hover { border-color: var(--red); color: var(--red); }

/* ── APP LAYOUT ── */
.app {
  display: grid; grid-template-columns: 460px 1fr;
  height: calc(100vh - 52px); min-height: 0;
}

/* ── LEFT PANE ── */
.form-pane {
  border-right: 2px solid var(--border); background: var(--surface);
  overflow-y: auto; padding: 24px 22px 48px; min-height: 0;
}
.pane-title {
  font-family: 'Bebas Neue'; font-size: 12px; letter-spacing: 3px; color: var(--muted);
  margin-bottom: 18px; display: flex; align-items: center; gap: 8px;
}
.pane-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.field { margin-bottom: 16px; }
label { display: block; font-size: 10px; font-weight: 700; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; }
input[type=text], input[type=url], input[type=number], textarea, select {
  width: 100%; background: var(--bg2); border: 1.5px solid var(--border);
  color: var(--text); font-family: 'JetBrains Mono'; font-size: 12.5px;
  padding: 8px 11px; outline: none; transition: border-color 0.15s; resize: vertical;
}
input:focus, textarea:focus, select:focus { border-color: var(--blue); background: #fff; }
textarea { min-height: 68px; }

/* CHIPS */
.chips-row { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
.chip {
  font-size: 10px; padding: 3px 9px; border: 1px solid var(--border); background: var(--bg2);
  color: var(--muted); cursor: pointer; font-family: 'JetBrains Mono'; transition: all 0.12s;
}
.chip:hover { border-color: var(--blue); color: var(--blue); background: #eaf4fd; }
.chip.tone { border-color: var(--navy); color: var(--navy); }
.chip.tone:hover { background: var(--navy); color: #fff; }

/* TOGGLE GROUPS */
.tog-group { display: flex; gap: 4px; flex-wrap: wrap; }
.tog-btn {
  padding: 6px 12px; font-family: 'JetBrains Mono'; font-size: 11px; font-weight: 600;
  border: 1.5px solid var(--border); background: var(--bg2); color: var(--muted);
  cursor: pointer; transition: all 0.12s; letter-spacing: 0.3px;
}
.tog-btn:hover { border-color: var(--blue); color: var(--blue); }
.tog-btn.active-none   { border-color: var(--muted); background: #f0f4f8; color: var(--navy); }
.tog-btn.active-apikey { border-color: var(--amber); background: #fdf3e6; color: var(--amber); }
.tog-btn.active-jwt    { border-color: var(--blue);  background: #e8f4fd; color: var(--blue); }
.tog-btn.active-oauth  { border-color: var(--green); background: #e6f7ef; color: var(--green); }
.tog-btn.active-json   { border-color: var(--blue);  background: #e8f4fd; color: var(--blue); }
.tog-btn.active-xml    { border-color: var(--amber); background: #fdf3e6; color: var(--amber); }
.tog-btn.active-graphql { border-color: var(--red);  background: #fdeaea; color: var(--red); }
.tog-btn.active-prod   { border-color: var(--green); background: #e6f7ef; color: var(--green); }
.tog-btn.active-stag   { border-color: var(--amber); background: #fdf3e6; color: var(--amber); }
.tog-btn.active-sand   { border-color: var(--blue);  background: #e8f4fd; color: var(--blue); }

/* ENDPOINT BUILDER */
.ep-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 6px; }
.ep-row { display: flex; gap: 5px; align-items: center; }
.ep-method-sel {
  width: 82px; flex-shrink: 0; padding: 7px 6px; font-family: 'JetBrains Mono';
  font-size: 11px; font-weight: 700; border: 1.5px solid var(--border);
  background: var(--bg2); color: var(--muted); cursor: pointer; outline: none; appearance: none;
}
.ep-path { flex: 1.2; padding: 7px 9px; font-size: 12px; }
.ep-desc { flex: 1; padding: 7px 9px; font-size: 11px; }
.ep-del {
  width: 26px; height: 26px; flex-shrink: 0; border: 1.5px solid var(--border);
  background: none; color: var(--muted); cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center; transition: all 0.12s;
}
.ep-del:hover { border-color: var(--red); color: var(--red); background: #fdeaea; }
.add-ep-btn {
  padding: 6px 12px; font-size: 10px; font-weight: 700; letter-spacing: 1px;
  font-family: 'JetBrains Mono'; border: 1.5px dashed var(--border); background: none;
  color: var(--muted); cursor: pointer; transition: all 0.12s; text-transform: uppercase;
}
.add-ep-btn:hover { border-color: var(--blue); color: var(--blue); }

/* GENERATE BTN */
.gen-btn {
  width: 100%; padding: 14px; font-family: 'Bebas Neue'; font-size: 20px;
  letter-spacing: 4px; background: var(--navy); color: #fff; border: none;
  cursor: pointer; transition: all 0.15s; margin-top: 8px;
}
.gen-btn:hover { background: #1a3560; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(15,31,61,0.2); }

/* ── RIGHT PANE ── */
.doc-pane {
  overflow-y: auto; padding: 0; min-height: 0; background: var(--bg);
  display: flex; flex-direction: column;
}

/* EMPTY STATE */
.empty-state {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 14px; color: var(--muted); text-align: center; padding: 40px;
}
.empty-icon { font-family: 'Bebas Neue'; font-size: 80px; letter-spacing: 4px; opacity: 0.07; color: var(--navy); }
.empty-state p { font-size: 12px; line-height: 1.8; max-width: 300px; }

/* LOADING */
.loading-state {
  flex: 1; display: none; flex-direction: column; align-items: center;
  justify-content: center; gap: 18px;
}
.loading-title { font-family: 'Bebas Neue'; font-size: 26px; letter-spacing: 4px; color: var(--muted); }
.loading-steps { font-size: 11px; color: var(--muted); letter-spacing: 1px; }
.loading-bar { width: 260px; height: 2px; background: var(--border); overflow: hidden; }
.loading-fill { height: 100%; background: linear-gradient(90deg,var(--navy),var(--blue)); animation: lprog 1.8s ease-out forwards; width: 0; }
@keyframes lprog { to { width: 100%; } }

/* DOC CONTENT */
.doc-content { display: none; padding: 32px 36px 80px; animation: fade 0.4s ease; }
@keyframes fade { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

/* DOC HEADER */
.doc-api-name { font-family: 'Bebas Neue'; font-size: 48px; letter-spacing: 3px; color: var(--navy); line-height: 1; margin-bottom: 10px; }
.doc-badges { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
.dbadge {
  padding: 3px 11px; font-size: 10px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; border: 1.5px solid var(--border); color: var(--muted); background: var(--bg2);
}
.dbadge-blue   { border-color: var(--blue);  background: #e8f4fd; color: var(--blue); }
.dbadge-green  { border-color: var(--green); background: #e6f7ef; color: var(--green); }
.dbadge-amber  { border-color: var(--amber); background: #fdf3e6; color: var(--amber); }
.dbadge-navy   { border-color: var(--navy);  background: #e8edf5; color: var(--navy); }
.dbadge-red    { border-color: var(--red);   background: #fdeaea; color: var(--red); }

.base-url-block {
  display: flex; align-items: center; gap: 10px; background: #f8f9fa;
  border: 1.5px solid var(--border); border-left: 3px solid var(--navy);
  padding: 10px 14px; margin-bottom: 14px;
}
.base-url-text { font-size: 13px; font-weight: 600; color: var(--navy); flex: 1; }
.url-copy-btn {
  font-size: 10px; padding: 3px 9px; border: 1px solid var(--border); background: none;
  color: var(--muted); cursor: pointer; font-family: 'JetBrains Mono'; transition: all 0.12s;
}
.url-copy-btn:hover { border-color: var(--blue); color: var(--blue); }
.doc-description { font-size: 13px; line-height: 1.7; color: var(--muted); margin-bottom: 20px; max-width: 720px; }

/* STATS BAR */
.stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 24px; }
.stat-card { border: 1.5px solid var(--border); padding: 12px 14px; background: var(--bg2); }
.stat-val { font-family: 'Bebas Neue'; font-size: 24px; letter-spacing: 1px; color: var(--navy); }
.stat-label { font-size: 9px; letter-spacing: 1.5px; color: var(--muted); text-transform: uppercase; margin-top: 2px; }

/* SECTION CARDS */
.doc-section { border: 1.5px solid var(--border); margin-bottom: 20px; background: var(--surface); }
.doc-sec-head {
  padding: 10px 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.doc-sec-title {
  font-family: 'Bebas Neue'; font-size: 14px; letter-spacing: 2px;
  color: var(--navy); display: flex; align-items: center; gap: 8px;
}
.sec-dot { width: 7px; height: 7px; border-radius: 50%; }
.doc-sec-body { padding: 18px; }

/* SVG DIAGRAMS */
svg.diagram { width: 100%; display: block; }

/* ENDPOINT TABLE */
.ep-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.ep-table th {
  font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted);
  font-weight: 700; padding: 8px 12px; border-bottom: 2px solid var(--border);
  text-align: left; background: var(--bg2);
}
.ep-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.ep-table tr:nth-child(even) td { background: #fafbfc; }
.ep-table tr.ep-expandable:hover td { background: #f0f7ff; cursor: pointer; }
.method-pill {
  padding: 2px 8px; font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
  display: inline-block;
}
.m-GET    { background: #e6f7ef; color: var(--green); border: 1px solid var(--green); }
.m-POST   { background: #e8f4fd; color: var(--blue);  border: 1px solid var(--blue); }
.m-PUT    { background: #fdf3e6; color: var(--amber); border: 1px solid var(--amber); }
.m-PATCH  { background: #fffbe6; color: #a07800;      border: 1px solid #d4a017; }
.m-DELETE { background: #fdeaea; color: var(--red);   border: 1px solid var(--red); }

.ep-expand-row td { padding: 0; border-bottom: 1px solid var(--border); }
.ep-expand-inner { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
.ep-expand-inner.open { max-height: 400px; }
.ep-expand-code { background: #1a2332; color: #cdd9e5; padding: 14px 16px; font-size: 11px; font-family: 'JetBrains Mono'; white-space: pre; overflow-x: auto; line-height: 1.6; }

/* ERROR TABLE */
.err-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.err-table td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
.err-table tr:nth-child(even) td { background: #fafbfc; }
.code-pill { padding: 2px 8px; font-size: 10px; font-weight: 700; }
.c2 { background: #e6f7ef; color: var(--green); border: 1px solid var(--green); }
.c4 { background: #fdf3e6; color: var(--amber); border: 1px solid var(--amber); }
.c5 { background: #fdeaea; color: var(--red);   border: 1px solid var(--red); }

/* BOTTOM BAR */
.doc-action-bar {
  position: sticky; bottom: 0; background: rgba(255,255,255,0.96);
  border-top: 2px solid var(--border); padding: 10px 36px;
  display: flex; gap: 8px; z-index: 50; backdrop-filter: blur(6px);
}
.act-btn {
  padding: 9px 18px; font-family: 'JetBrains Mono'; font-size: 10px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase; cursor: pointer;
  border: 2px solid var(--border); background: var(--surface); color: var(--text); transition: all 0.12s;
}
.act-btn.md-btn { border-color: var(--blue); color: var(--blue); }
.act-btn.md-btn:hover { background: var(--blue); color: #fff; }
.act-btn.pdf-btn { border-color: var(--navy); color: var(--navy); }
.act-btn.pdf-btn:hover { background: var(--navy); color: #fff; }

/* TOAST */
.toast {
  position: fixed; bottom: 60px; right: 24px; background: var(--navy); color: #fff;
  padding: 9px 18px; font-size: 11px; font-family: 'JetBrains Mono';
  opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 9999;
  border-left: 3px solid var(--green);
}
.toast.show { opacity: 1; }

/* PRINT */
@media print {
  .form-pane, header, .doc-action-bar { display: none !important; }
  html, body { overflow: visible !important; height: auto !important; }
  .app { display: block; height: auto; }
  .doc-pane { overflow: visible; height: auto; }
  .doc-content { display: block !important; padding: 20px; }
  .ep-expand-inner { max-height: none !important; }
  .ep-expand-code { font-size: 9px; white-space: pre-wrap; }
  svg.diagram { page-break-inside: avoid; }
}

/* RESPONSIVE */
@media (max-width: 860px) {
  html, body { overflow: auto; }
  .app { grid-template-columns: 1fr; height: auto; overflow: visible; }
  .form-pane { overflow: visible; }
  .doc-pane { overflow: visible; min-height: 600px; }
  .stats-bar { grid-template-columns: 1fr 1fr; }
}

/* Gauge animation */
@keyframes gaugeAnim {
  from { stroke-dashoffset: 220; }
}
@keyframes barAnim {
  from { width: 0; }
}
.bar-fill { animation: barAnim 1.2s cubic-bezier(0.4,0,0.2,1) forwards; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">DF</div>
    <div class="logo-text">Doc<span>Forge</span></div>
  </div>
  <div class="header-right">
    <span class="hdr-badge">AI-POWERED</span>
    <span class="hdr-badge">API DOCS</span>
    <button class="reset-btn" id="resetBtn">↺ Reset</button>
  </div>
</header>

<div class="app">
  <!-- LEFT PANE -->
  <div class="form-pane">
    <div class="pane-title">CONFIGURE API</div>

    <div class="field">
      <label>API Name</label>
      <input type="text" id="apiName" placeholder="e.g. Payment Gateway API" autocomplete="off">
      <div class="chips-row" id="nameChips"></div>
    </div>

    <div class="field">
      <label>Base URL</label>
      <input type="url" id="baseUrl" placeholder="https://api.example.com/v1" autocomplete="off">
      <div class="chips-row" id="urlChips"></div>
    </div>

    <div class="field">
      <label>API Version</label>
      <input type="text" id="apiVersion" placeholder="v1.2.0">
    </div>

    <div class="field">
      <label>Authentication Type</label>
      <div class="tog-group" id="authToggles">
        <button class="tog-btn active-none" data-auth="None">None</button>
        <button class="tog-btn" data-auth="API Key">API Key</button>
        <button class="tog-btn" data-auth="Bearer JWT">Bearer JWT</button>
        <button class="tog-btn" data-auth="OAuth 2.0">OAuth 2.0</button>
      </div>
    </div>

    <div class="field">
      <label>Endpoints</label>
      <div class="ep-list" id="epList"></div>
      <button class="add-ep-btn" id="addEpBtn">+ Add Endpoint</button>
    </div>

    <div class="field">
      <label>Response Format</label>
      <div class="tog-group" id="fmtToggles">
        <button class="tog-btn active-json" data-fmt="JSON">JSON</button>
        <button class="tog-btn" data-fmt="XML">XML</button>
        <button class="tog-btn" data-fmt="GraphQL">GraphQL</button>
      </div>
    </div>

    <div class="field">
      <label>Environment</label>
      <div class="tog-group" id="envToggles">
        <button class="tog-btn active-prod" data-env="Production">Production</button>
        <button class="tog-btn" data-env="Staging">Staging</button>
        <button class="tog-btn" data-env="Sandbox">Sandbox</button>
      </div>
    </div>

    <div class="field">
      <label>Rate Limit (req/min)</label>
      <input type="number" id="rateLimit" placeholder="1000" min="1">
    </div>

    <div class="field">
      <label>Tags / Categories</label>
      <input type="text" id="tags" placeholder="auth, users, billing, payments">
    </div>

    <div class="field">
      <label>API Description</label>
      <textarea id="apiDesc" placeholder="Describe what this API does..."></textarea>
      <div class="chips-row" id="toneChips">
        <span class="chip tone" data-tone="technical">Technical</span>
        <span class="chip tone" data-tone="developer-friendly">Developer-Friendly</span>
        <span class="chip tone" data-tone="enterprise">Enterprise</span>
        <span class="chip tone" data-tone="minimal">Minimal</span>
      </div>
    </div>

    <button class="gen-btn" id="genBtn">⚡ Generate Documentation</button>
  </div>

  <!-- RIGHT PANE -->
  <div class="doc-pane" id="docPane">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">API</div>
      <p>Configure your API on the left and click Generate to produce full documentation with diagrams, charts, and endpoint references.</p>
    </div>
    <div class="loading-state" id="loadingState">
      <div class="loading-title">GENERATING DOCS</div>
      <div class="loading-steps" id="loadingStep">Parsing endpoints…</div>
      <div class="loading-bar"><div class="loading-fill" id="loadingFill"></div></div>
    </div>
    <div class="doc-content" id="docContent"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── STATE ──────────────────────────────────────────────────────────────────────
const S = {
  auth: 'None', format: 'JSON', env: 'Production', tone: 'technical'
};

// ── NAME SUGGESTIONS ───────────────────────────────────────────────────────────
const NAME_MAP = {
  payment: ['Payment Gateway API','Billing & Invoice API','Transaction Processing API'],
  user: ['User Management Service','User Identity API','Account & Profile API'],
  auth: ['Authentication & Identity API','OAuth Authorization Service','Access Control API'],
  order: ['Order Management API','E-commerce Orders API','Order Fulfillment Service'],
  product: ['Product Catalog API','Inventory Management API','Product Search API'],
  notification: ['Notification Service API','Messaging & Alerts API','Push Notification API'],
  analytics: ['Analytics & Reporting API','Data Insights API','Metrics Service API'],
  file: ['File Storage API','Document Management API','Media Upload Service'],
};
const URL_TEMPLATES = ['https://api.{slug}.com/v1','https://{slug}-api.io/v2','https://gateway.{slug}.dev/api/v1'];

// ── INIT ───────────────────────────────────────────────────────────────────────
function init() {
  setupToggles();
  setupNameSuggestions();
  setupToneChips();
  initEndpoints();
  document.getElementById('addEpBtn').addEventListener('click', () => addEpRow());
  document.getElementById('genBtn').addEventListener('click', generate);
  document.getElementById('resetBtn').addEventListener('click', resetAll);
}

function setupToggles() {
  // Auth
  document.querySelectorAll('#authToggles .tog-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#authToggles .tog-btn').forEach(b => b.className='tog-btn');
      S.auth = btn.dataset.auth;
      const m = {'None':'active-none','API Key':'active-apikey','Bearer JWT':'active-jwt','OAuth 2.0':'active-oauth'};
      btn.classList.add(m[S.auth]);
    });
  });
  // Format
  document.querySelectorAll('#fmtToggles .tog-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#fmtToggles .tog-btn').forEach(b => b.className='tog-btn');
      S.format = btn.dataset.fmt;
      const m = {'JSON':'active-json','XML':'active-xml','GraphQL':'active-graphql'};
      btn.classList.add(m[S.format]);
    });
  });
  // Env
  document.querySelectorAll('#envToggles .tog-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#envToggles .tog-btn').forEach(b => b.className='tog-btn');
      S.env = btn.dataset.env;

function setupNameSuggestions() {
  document.getElementById('apiName').addEventListener('input', function() {
    const v = this.value.toLowerCase();
    const nc = document.getElementById('nameChips');
    nc.innerHTML = '';
    if (!v) { document.getElementById('urlChips').innerHTML = ''; return; }
    const matches = [];
    for (const [k,arr] of Object.entries(NAME_MAP)) {
      if (v.includes(k)) matches.push(...arr);
    }
    [...new Set(matches)].slice(0,3).forEach(s => {
      const c = document.createElement('span'); c.className='chip'; c.textContent=s;
      c.onclick=()=>{ this.value=s; nc.innerHTML=''; suggestUrls(s); };
      nc.appendChild(c);
    });
    suggestUrls(this.value);
  });
}

function suggestUrls(name) {
  const slug = name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'').split('-')[0];
  const uc = document.getElementById('urlChips'); uc.innerHTML='';
  URL_TEMPLATES.slice(0,3).forEach(t => {
    const url = t.replace('{slug}', slug||'service');
    const c = document.createElement('span'); c.className='chip'; c.textContent=url;
    c.onclick=()=>{ document.getElementById('baseUrl').value=url; uc.innerHTML=''; };
    uc.appendChild(c);
  });
}

function setupToneChips() {
  document.querySelectorAll('#toneChips .chip').forEach(c => {
    c.addEventListener('click', () => {
      S.tone = c.dataset.tone;
      document.querySelectorAll('#toneChips .chip').forEach(x => x.style.background='');
      c.style.background = '#0f1f3d'; c.style.color='#fff'; c.style.borderColor='#0f1f3d';
    });
  });
}

function initEndpoints() {
  addEpRow('GET', '/users', 'List all users');
  addEpRow('POST', '/users', 'Create a new user');
  addEpRow('GET', '/users/:id', 'Get user by ID');
  addEpRow('PUT', '/users/:id', 'Update user');
  addEpRow('DELETE', '/users/:id', 'Delete user');
}

let epCount = 0;
function addEpRow(method='GET', path='', desc='') {
  epCount++;
  const row = document.createElement('div'); row.className='ep-row'; row.dataset.id=epCount;
  const methods = ['GET','POST','PUT','PATCH','DELETE'];
  const methodColors = {'GET':'color:var(--green)','POST':'color:var(--blue)','PUT':'color:var(--amber)','PATCH':'color:#a07800','DELETE':'color:var(--red)'};
  row.innerHTML = `
    <select class="ep-method-sel" style="${methodColors[method]||''}">
      ${methods.map(m=>`<option value="${m}" ${m===method?'selected':''}>${m}</option>`).join('')}
    </select>
    <input class="ep-path" type="text" placeholder="/path/:id" value="${escH(path)}">
    <input class="ep-desc" type="text" placeholder="Description" value="${escH(desc)}">
    <button class="ep-del" title="Remove">×</button>`;
  row.querySelector('.ep-del').onclick=()=>row.remove();
  row.querySelector('.ep-method-sel').onchange=function(){
    this.style.cssText=methodColors[this.value]||'';
  };
  document.getElementById('epList').appendChild(row);
}

function getEndpoints() {
  return [...document.querySelectorAll('#epList .ep-row')].map(r=>({
    method: r.querySelector('.ep-method-sel').value,
    path:   r.querySelector('.ep-path').value.trim() || '/endpoint',
    desc:   r.querySelector('.ep-desc').value.trim() || 'No description'
  }));
}

function resetAll() {
  document.getElementById('apiName').value='';
  document.getElementById('baseUrl').value='';
  document.getElementById('apiVersion').value='';
  document.getElementById('rateLimit').value='';
  document.getElementById('tags').value='';
  document.getElementById('apiDesc').value='';
  document.getElementById('epList').innerHTML='';
  document.getElementById('nameChips').innerHTML='';
  document.getElementById('urlChips').innerHTML='';

  document.getElementById('docContent').style.display='none';

// ── GENERATE ───────────────────────────────────────────────────────────────────
function generate() {
  document.getElementById('emptyState').style.display='none';
  document.getElementById('docContent').style.display='none';
  const ls=document.getElementById('loadingState'); ls.style.display='flex';
  const fill=document.getElementById('loadingFill');
  fill.style.animation='none'; fill.offsetHeight; fill.style.animation='lprog 1.8s ease-out forwards';
  const steps=['Parsing endpoints…','Generating descriptions…','Drawing diagrams…','Building reference tables…','Finalizing documentation…'];
  let si=0; const stepEl=document.getElementById('loadingStep');
  const iv=setInterval(()=>stepEl.textContent=steps[++si%steps.length],360);
  setTimeout(()=>{ clearInterval(iv); ls.style.display='none'; renderDoc(); },1850);
}

function renderDoc() {
  const name    = document.getElementById('apiName').value.trim() || 'My API';
  const baseUrl = document.getElementById('baseUrl').value.trim() || 'https://api.example.com/v1';
  const version = document.getElementById('apiVersion').value.trim() || 'v1.0.0';
  const rate    = document.getElementById('rateLimit').value || '1000';
  const tags    = document.getElementById('tags').value.trim();
  const desc    = document.getElementById('apiDesc').value.trim();
  const eps     = getEndpoints();
  const genDesc = desc || generateDesc(name, S.auth, S.format, S.tone, eps);

  const methodCount = {};
  eps.forEach(e=>{ methodCount[e.method]=(methodCount[e.method]||0)+1; });

  const dc = document.getElementById('docContent');
  dc.innerHTML = buildDoc({ name, baseUrl, version, rate, tags, desc: genDesc, eps, methodCount });
  dc.style.display='block';
  document.title = name + ' — DocForge';

  // Setup expand rows
  dc.querySelectorAll('.ep-expandable').forEach(row => {
    row.addEventListener('click', () => {
      const next = row.nextElementSibling;
      if (!next) return;
      const inner = next.querySelector('.ep-expand-inner');
      if (inner) inner.classList.toggle('open');
    });
  });

  // Animate gauge after render
  setTimeout(() => {
    const gauge = document.getElementById('gaugePath');
    if (gauge) {
      const pct = Math.min(parseInt(rate)/2000, 1);
      const maxDash = 220;
      const dashOffset = maxDash - (pct * maxDash);
      gauge.style.strokeDashoffset = dashOffset;
    }
  }, 100);

  // Setup action buttons
  dc.querySelector('#mdBtn')?.addEventListener('click', () => {
    navigator.clipboard.writeText(buildMarkdown({ name, baseUrl, version, rate, tags, desc: genDesc, eps }))
      .then(()=>showToast('Copied as Markdown!'));
  });
  dc.querySelector('#pdfBtn')?.addEventListener('click', () => {
    document.title = name.replace(/\s+/g,'-') + '-API-Docs.pdf';
    window.print();
  });
  dc.querySelector('#urlCopyBtn')?.addEventListener('click', () => {
    navigator.clipboard.writeText(baseUrl).then(()=>showToast('URL copied!'));
  });
}

// ── DESCRIPTION GENERATOR ──────────────────────────────────────────────────────
function generateDesc(name, auth, format, tone, eps) {
  const count = eps.length;
  const tones = {
    'technical': `${name} exposes ${count} RESTful endpoint${count!==1?'s':''} using ${format} over HTTPS. Authentication is handled via ${auth}. The API follows REST conventions with predictable resource-oriented URLs and standard HTTP response codes.`,
    'developer-friendly': `Welcome to the ${name}! This API makes it easy to integrate powerful features into your app. With ${count} endpoints, ${auth==='None'?'no auth required':'secure '+auth+' authentication'}, and ${format} responses, you'll be up and running in minutes.`,
    'enterprise': `${name} provides enterprise-grade access to core business functionality through ${count} secured endpoints. The API implements industry-standard ${auth} authentication, structured ${format} payloads, and comprehensive error handling to meet SLA requirements.`,
    'minimal': `${name}. ${count} endpoints. ${format}. ${auth}. HTTPS only.`
  };
  return tones[tone] || tones['technical'];
}

// ── SEQUENCE DIAGRAM ────────────────────────────────────────────────────────────
function buildSequenceDiagram(ep, auth) {
  const lanes = ['Client','Gateway','Auth','Service','Database'];
  const W = 680, laneW = W/lanes.length;
  const steps = [
    { from:0, to:1, label:`${ep.method} ${ep.path}`, y:80 },
    { from:1, to:2, label:'Verify credentials', y:120 },
    { from:2, to:1, label:'Auth OK (200)', y:150, back:true },
    { from:1, to:3, label:'Route request', y:190 },
    { from:3, to:4, label:'Query data', y:230 },
    { from:4, to:3, label:'Return rows', y:260, back:true },
    { from:3, to:0, label:'200 OK + payload', y:300, back:true },
  ];
  const laneX = i => laneW*i + laneW/2;
  const mc = {'GET':'#00a65a','POST':'#1a7fd4','PUT':'#e07800','DELETE':'#e03030','PATCH':'#d4a017'};
  const methodColor = mc[ep.method]||'#64748b';

  let arrows='';
  steps.forEach(s => {
    const x1=laneX(s.from), x2=laneX(s.to);
    const dir = s.back ? 'left' : 'right';
    arrows += `
      <line x1="${x1}" y1="${s.y}" x2="${x2}" y2="${s.y}" stroke="${s.from===0?methodColor:'#0f1f3d'}" stroke-width="1.5" marker-end="url(#seqArr)" opacity="0.8"/>
      <text x="${(x1+x2)/2}" y="${s.y-5}" text-anchor="middle" font-family="JetBrains Mono" font-size="8.5" fill="#64748b">${s.label}</text>`;
  });

  return `<svg class="diagram" viewBox="0 0 ${W} 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="seqArr" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0f1f3d"/>
    </marker>
  </defs>
  ${lanes.map((l,i)=>`
    <rect x="${laneX(i)-42}" y="8" width="84" height="26" fill="${i===0?'#e8f4fd':i===2?'#fdf3e6':'#e8edf5'}" stroke="${i===0?'#1a7fd4':i===2?'#e07800':'#0f1f3d'}" stroke-width="1.5"/>
    <text x="${laneX(i)}" y="25" text-anchor="middle" font-family="Bebas Neue" font-size="10" fill="${i===0?'#1a7fd4':i===2?'#e07800':'#0f1f3d'}" letter-spacing="1">${l}</text>
    <line x1="${laneX(i)}" y1="34" x2="${laneX(i)}" y2="320" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,3"/>
  `).join('')}
  ${arrows}
</svg>`;
}

// ── RATE GAUGE SVG ─────────────────────────────────────────────────────────────
function buildGauge(rate) {
  const r = parseInt(rate)||1000;
  const maxRate = Math.max(r * 2, 2000);
  const pct = Math.min(r/maxRate, 1);
  const maxDash = 220;
  const initOffset = maxDash;
  const targetOffset = maxDash - pct*maxDash;
  const color = pct<0.6?'#00a65a':pct<0.85?'#e07800':'#e03030';

  return `<svg class="diagram" viewBox="0 0 300 170" xmlns="http://www.w3.org/2000/svg">
  <path d="M30 150 A 120 120 0 0 1 270 150" fill="none" stroke="#f0f4f8" stroke-width="20" stroke-linecap="round"/>
  <path id="gaugePath" d="M30 150 A 120 120 0 0 1 270 150" fill="none" stroke="${color}" stroke-width="20" stroke-linecap="round"
    stroke-dasharray="${maxDash}" stroke-dashoffset="${initOffset}"
    style="transition: stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1)"/>
  <text x="150" y="130" text-anchor="middle" font-family="Bebas Neue" font-size="36" fill="#0f1f3d" letter-spacing="2">${r}</text>
  <text x="150" y="148" text-anchor="middle" font-family="JetBrains Mono" font-size="10" fill="#64748b">req/min</text>
  <text x="30" y="165" font-family="JetBrains Mono" font-size="9" fill="#00a65a">0</text>
  <text x="240" y="165" font-family="JetBrains Mono" font-size="9" fill="#e03030">${maxRate}</text>

}

// ── METHOD DISTRIBUTION CHART ──────────────────────────────────────────────────
function buildBarChart(methodCount) {
  const methods = ['GET','POST','PUT','PATCH','DELETE'];
  const colors  = { GET:'#00a65a',POST:'#1a7fd4',PUT:'#e07800',PATCH:'#d4a017',DELETE:'#e03030' };
  const max = Math.max(...Object.values(methodCount), 1);
  const barH=28, gap=10, paddingL=70, paddingR=30, svgW=480;
  const chartW = svgW - paddingL - paddingR;
  const svgH = methods.length*(barH+gap)+40;
  let bars='';
  methods.forEach((m,i) => {
    const count = methodCount[m]||0;
    const barW = (count/max)*chartW;
    const y = 20 + i*(barH+gap);
    const color = colors[m];
    bars += `
      <text x="${paddingL-8}" y="${y+barH/2+4}" text-anchor="end" font-family="Bebas Neue" font-size="12" fill="${color}" letter-spacing="1">${m}</text>
      <rect x="${paddingL}" y="${y}" width="${chartW}" height="${barH}" fill="#f8f9fa" stroke="#e2e8f0" stroke-width="1"/>
      <rect x="${paddingL}" y="${y}" width="${barW}" height="${barH}" fill="${color}33" stroke="${color}" stroke-width="1.5">
        <animate attributeName="width" from="0" to="${barW}" dur="0.9s" begin="${i*0.15}s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
      </rect>
      <text x="${paddingL + barW + 6}" y="${y+barH/2+4}" font-family="JetBrains Mono" font-size="11" fill="${color}" font-weight="700">${count}</text>`;
  });
  return `<svg class="diagram" viewBox="0 0 ${svgW} ${svgH}" xmlns="http://www.w3.org/2000/svg">${bars}</svg>`;
}

}

// ── ERROR TABLE ────────────────────────────────────────────────────────────────
function buildErrorTable(eps) {
  const methods = [...new Set(eps.map(e=>e.method))];
  const errors = [
    { code:200, label:'OK',                    desc:'Request succeeded.',             cls:'c2', show: true },
    { code:201, label:'Created',               desc:'Resource created successfully.', cls:'c2', show: methods.includes('POST') },
    { code:204, label:'No Content',            desc:'Success with no response body.', cls:'c2', show: methods.includes('DELETE')||methods.includes('PUT') },
    { code:400, label:'Bad Request',           desc:'Invalid request payload or parameters.',    cls:'c4', show: true },
    { code:401, label:'Unauthorized',          desc:'Missing or invalid authentication.',        cls:'c4', show: true },
    { code:403, label:'Forbidden',             desc:'Authenticated but not authorized.',         cls:'c4', show: true },
    { code:404, label:'Not Found',             desc:'Requested resource does not exist.',        cls:'c4', show: true },
    { code:405, label:'Method Not Allowed',    desc:'HTTP method not supported on this route.',  cls:'c4', show: true },
    { code:422, label:'Unprocessable Entity',  desc:'Validation failed on request body.',        cls:'c4', show: methods.includes('POST')||methods.includes('PUT') },
    { code:429, label:'Too Many Requests',     desc:'Rate limit exceeded. Retry after delay.',   cls:'c4', show: true },
    { code:500, label:'Internal Server Error', desc:'Unexpected server-side failure.',           cls:'c5', show: true },
    { code:502, label:'Bad Gateway',           desc:'Upstream service returned invalid response.',cls:'c5',show: true },
    { code:503, label:'Service Unavailable',   desc:'Server temporarily offline or overloaded.', cls:'c5', show: true },
  ];
  const rows = errors.filter(e=>e.show).map(e=>
    `<tr><td><span class="code-pill ${e.cls}">${e.code}</span></td><td style="font-weight:600">${e.label}</td><td style="color:var(--muted)">${e.desc}</td></tr>`
  ).join('');
  return `<table class="err-table"><thead><tr>
    <th>Code</th><th>Status</th><th>Description</th>
  </tr></thead><tbody>${rows}</tbody></table>`;
}

// ── MOCK PAYLOAD ───────────────────────────────────────────────────────────────
function mockPayload(method, path) {
  if (method==='DELETE') return `// Request\nDELETE ${path}\n\n// Response\nHTTP/1.1 204 No Content`;
  if (method==='GET') return `// Request\nGET ${path}\n\n// Response 200 OK\n{\n  "data": [\n    { "id": "usr_1a2b3c", "name": "Jane Doe", "email": "jane@example.com", "createdAt": "2024-03-15T10:00:00Z" }\n  ],\n  "meta": { "total": 1, "page": 1, "perPage": 20 }\n}`;
  if (method==='POST') return `// Request\nPOST ${path}\nContent-Type: application/json\n\n{\n  "name": "Jane Doe",\n  "email": "jane@example.com"\n}\n\n// Response 201 Created\n{\n  "data": { "id": "usr_1a2b3c", "name": "Jane Doe", "email": "jane@example.com", "createdAt": "2024-03-15T10:00:00Z" }\n}`;
  return `// Request\n${method} ${path}\nContent-Type: application/json\n\n{ "name": "Updated Name" }\n\n// Response 200 OK\n{\n  "data": { "id": "usr_1a2b3c", "name": "Updated Name" },\n  "message": "Updated successfully"\n}`;
}

// ── MARKDOWN EXPORT ────────────────────────────────────────────────────────────
function buildMarkdown({ name, baseUrl, version, rate, tags, desc, eps }) {
  let md = `# ${name}\n\n`;
  md += `**Version:** ${version}  \n**Base URL:** \`${baseUrl}\`  \n**Auth:** ${S.auth}  \n**Format:** ${S.format}  \n**Rate Limit:** ${rate} req/min\n\n`;
  md += `## Description\n\n${desc}\n\n`;
  md += `## Endpoints\n\n| Method | Path | Description |\n|--------|------|-------------|\n`;
  eps.forEach(e=>{ md += `| \`${e.method}\` | \`${e.path}\` | ${e.desc} |\n`; });
  md += `\n## Error Codes\n\n| Code | Description |\n|------|-------------|\n`;
  md += `| 200 | OK |\n| 400 | Bad Request |\n| 401 | Unauthorized |\n| 404 | Not Found |\n| 500 | Internal Server Error |\n`;
  return md;
}

// ── MAIN BUILD ─────────────────────────────────────────────────────────────────
function buildDoc({ name, baseUrl, version, rate, tags, desc, eps, methodCount }) {
  const authBadgeClass = {'None':'','API Key':'dbadge-amber','Bearer JWT':'dbadge-blue','OAuth 2.0':'dbadge-green'}[S.auth]||'';
  const envBadgeClass  = {'Production':'dbadge-green','Staging':'dbadge-amber','Sandbox':'dbadge-blue'}[S.env]||'';
  const fmtBadgeClass  = {'JSON':'dbadge-blue','XML':'dbadge-amber','GraphQL':'dbadge-red'}[S.format]||'';
  const exampleEp = eps[0]||{method:'GET',path:'/resource',desc:'Example'};

  const epTableRows = eps.map((ep,i) => {
    const authReq = S.auth !== 'None' ? `<span style="color:var(--green);font-weight:700">Yes</span>` : `<span style="color:var(--muted)">No</span>`;
    const status  = ep.method==='POST' ? '201' : ep.method==='DELETE' ? '204' : '200';
    const sCls    = 'c2';
    return `<tr class="ep-expandable">
      <td><span class="method-pill m-${ep.method}">${ep.method}</span></td>
      <td style="font-weight:600;font-family:'JetBrains Mono';font-size:12px">${escH(ep.path)}</td>
      <td style="color:var(--muted);font-size:12px">${escH(ep.desc)}</td>
      <td>${authReq}</td>
      <td><span class="code-pill ${sCls}">${status}</span></td>
    </tr>
    <tr class="ep-expand-row">
      <td colspan="5"><div class="ep-expand-inner"><div class="ep-expand-code">${escH(mockPayload(ep.method, ep.path))}</div></div></td>
    </tr>`;
  }).join('');

  return `
  <div>
    <div class="doc-api-name">${escH(name)}</div>
    <div class="doc-badges">
      <span class="dbadge dbadge-navy">${escH(version)}</span>
      <span class="dbadge ${envBadgeClass}">${S.env}</span>
      <span class="dbadge ${authBadgeClass}">${S.auth}</span>
      <span class="dbadge ${fmtBadgeClass}">${S.format}</span>
      ${tags ? tags.split(',').map(t=>`<span class="dbadge">${escH(t.trim())}</span>`).join('') : ''}
    </div>
    <div class="base-url-block">
      <span class="base-url-text">${escH(baseUrl)}</span>
      <button class="url-copy-btn" id="urlCopyBtn">COPY</button>
    </div>
    <p class="doc-description">${escH(desc)}</p>

    <!-- STATS BAR -->
    <div class="stats-bar">
      <div class="stat-card"><div class="stat-val">${eps.length}</div><div class="stat-label">Total Endpoints</div></div>
      <div class="stat-card"><div class="stat-val">${S.auth}</div><div class="stat-label">Auth Method</div></div>
      <div class="stat-card"><div class="stat-val">${rate||'—'}<span style="font-size:14px"> /m</span></div><div class="stat-label">Rate Limit</div></div>
      <div class="stat-card"><div class="stat-val">${S.format}</div><div class="stat-label">Response Format</div></div>
    </div>

    <!-- ARCHITECTURE DIAGRAM -->
    <div class="doc-section">
      <div class="doc-sec-head">
        <div class="doc-sec-title"><div class="sec-dot" style="background:var(--navy)"></div>ARCHITECTURE DIAGRAM</div>
      </div>
      <div class="doc-sec-body">${buildArchDiagram(eps, S.auth)}</div>
    </div>

    <!-- ENDPOINT REFERENCE -->
    <div class="doc-section">
      <div class="doc-sec-head">
        <div class="doc-sec-title"><div class="sec-dot" style="background:var(--blue)"></div>ENDPOINT REFERENCE</div>
        <span style="font-size:10px;color:var(--muted)">Click row to expand</span>
      </div>
      <div class="doc-sec-body" style="padding:0">
        <table class="ep-table">
          <thead><tr><th>Method</th><th>Path</th><th>Description</th><th>Auth</th><th>Status</th></tr></thead>
          <tbody>${epTableRows}</tbody>
        </table>
      </div>
    </div>

    <!-- REQUEST FLOW -->
    <div class="doc-section">
      <div class="doc-sec-head">
        <div class="doc-sec-title"><div class="sec-dot" style="background:var(--amber)"></div>REQUEST FLOW — ${escH(exampleEp.method)} ${escH(exampleEp.path)}</div>
      </div>
      <div class="doc-sec-body">${buildSequenceDiagram(exampleEp, S.auth)}</div>
    </div>

    <!-- RATE LIMIT + DISTRIBUTION -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">
      <div class="doc-section" style="margin:0">
        <div class="doc-sec-head">
          <div class="doc-sec-title"><div class="sec-dot" style="background:var(--green)"></div>RATE LIMIT GAUGE</div>
        </div>
        <div class="doc-sec-body">${buildGauge(rate)}</div>
      </div>
      <div class="doc-section" style="margin:0">
        <div class="doc-sec-head">
          <div class="doc-sec-title"><div class="sec-dot" style="background:var(--blue)"></div>METHOD DISTRIBUTION</div>
        </div>
        <div class="doc-sec-body">${buildBarChart(methodCount)}</div>
      </div>
    </div>

    <!-- AUTH FLOW -->
    <div class="doc-section">
      <div class="doc-sec-head">
        <div class="doc-sec-title"><div class="sec-dot" style="background:var(--amber)"></div>AUTHENTICATION FLOW — ${S.auth}</div>
      </div>
      <div class="doc-sec-body">${buildAuthDiagram(S.auth)}</div>
    </div>

    <!-- ERROR CODES -->
    <div class="doc-section">
      <div class="doc-sec-head">
        <div class="doc-sec-title"><div class="sec-dot" style="background:var(--red)"></div>ERROR CODE REFERENCE</div>
      </div>
      <div class="doc-sec-body" style="padding:0">${buildErrorTable(eps)}</div>
    </div>

    <!-- ACTION BAR -->
    <div class="doc-action-bar">
      <button class="act-btn md-btn" id="mdBtn">[ COPY AS MARKDOWN ]</button>
      <button class="act-btn pdf-btn" id="pdfBtn">[ DOWNLOAD AS PDF ]</button>
    </div>
  </div>`;
}

function escH(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showToast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

init();
</script>
